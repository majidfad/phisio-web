name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: production-deploy-frontend
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  APP_DIR: /opt/phisio

jobs:
  deploy:
    name: Build and deploy Web
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/phisio-web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/phisio-web:${{ github.event.workflow_run.head_sha }}
          build-args: |
            VITE_API_BASE_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_OWNER: ${{ env.IMAGE_OWNER }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          APP_DIR: ${{ env.APP_DIR }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: REGISTRY,IMAGE_OWNER,IMAGE_TAG,APP_DIR,GHCR_PULL_TOKEN,GITHUB_ACTOR
          script: |
            set -euo pipefail
            cd "${APP_DIR}"

            if [ ! -f docker-compose.prod.yml ] || [ ! -f .env ]; then
              echo "Missing ${APP_DIR}/docker-compose.prod.yml or .env"
              echo "Bootstrap and deploy API (phisio-api) first — it owns the compose file"
              exit 1
            fi

            if ! docker inspect -f '{{.State.Running}}' phisio-api 2>/dev/null | grep -q true; then
              echo "API container is not running — deploy phisio-api first"
              exit 1
            fi

            if [ -n "${GHCR_PULL_TOKEN:-}" ]; then
              echo "${GHCR_PULL_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            else
              echo "GHCR_PULL_TOKEN is empty — pull may fail for private packages"
            fi

            export PHISIO_WEB_IMAGE="${REGISTRY}/${IMAGE_OWNER}/phisio-web:${IMAGE_TAG}"

            case "${PHISIO_WEB_IMAGE}" in
              ghcr.io/*) ;;
              *)
                echo "Refusing non-GHCR web image: ${PHISIO_WEB_IMAGE}"
                exit 1
                ;;
            esac

            if grep -q '^PHISIO_WEB_IMAGE=' .env; then
              sed -i "s|^PHISIO_WEB_IMAGE=.*|PHISIO_WEB_IMAGE=${PHISIO_WEB_IMAGE}|" .env
            else
              echo "PHISIO_WEB_IMAGE=${PHISIO_WEB_IMAGE}" >> .env
            fi

            if ! grep -qE '^COMPOSE_PROJECT_NAME=' .env; then
              echo 'COMPOSE_PROJECT_NAME=phisio' >> .env
            fi

            HTTP_PORT="$(grep -E '^HTTP_PORT=' .env 2>/dev/null | cut -d= -f2- || true)"
            HTTP_PORT="${HTTP_PORT:-3000}"

            echo "Removing previous Web container/image before pull..."
            docker compose -f docker-compose.prod.yml --env-file .env --profile web stop web || true
            docker compose -f docker-compose.prod.yml --env-file .env --profile web rm -f web || true
            docker images "${REGISTRY}/${IMAGE_OWNER}/phisio-web" -q | sort -u | xargs -r docker rmi -f || true

            docker compose -f docker-compose.prod.yml --env-file .env --profile web pull web
            docker compose -f docker-compose.prod.yml --env-file .env --profile web up -d --no-deps web
            docker compose -f docker-compose.prod.yml --env-file .env --profile web ps

            docker image prune -f || true

            for i in $(seq 1 30); do
              if curl -fsS "http://localhost:${HTTP_PORT}/" > /dev/null \
                && curl -fsS "http://localhost:${HTTP_PORT}/api/health" > /dev/null; then
                echo "Frontend health check passed"
                exit 0
              fi
              sleep 5
            done

            echo "Frontend health check failed"
            docker compose -f docker-compose.prod.yml --env-file .env --profile web logs --tail=100 web
            exit 1
